<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexander Savelyev - Business Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      perspective: 1000px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 400px;
      height: 280px;
      background: linear-gradient(135deg, #ffffff 0%, #f5f7fa 100%);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
      cursor: auto;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
      transform: rotate(45deg);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .card:hover {
      transform: translateY(-10px) rotateX(5deg);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
    }

    .card-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .header {
      animation: slideInDown 0.8s ease-out;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
    }

    .title {
      font-size: 13px;
      color: #764ba2;
      font-weight: 500;
      line-height: 1.4;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      margin: 15px 0;
      border-radius: 2px;
      animation: expandWidth 0.8s ease-out 0.2s backwards;
    }

    @keyframes expandWidth {
      from { width: 0; }
      to { width: 40px; }
    }

    .details {
      animation: slideInUp 0.8s ease-out 0.3s backwards;
    }

    .detail-item {
      font-size: 12px;
      color: #555;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      word-break: break-word;
    }

    .detail-item:hover {
      color: #667eea;
      transform: translateX(5px);
    }

    .detail-link {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }

    .detail-link:hover {
      color: #667eea;
    }

    .icon {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      font-weight: bold;
      flex-shrink: 0;
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-content">
        <div class="header">
          <div class="name">Alexander Savelyev</div>
          <div class="title">Lead Technical Project Manager<br>Ozon Fintech</div>
          <div class="divider"></div>
        </div>

        <div class="details">
          <div class="detail-item">
            <div class="icon">✉</div>
            <a href="mailto:yomanmf@gmail.com" class="detail-link">yomanmf@gmail.com</a>
          </div>
          <div class="detail-item">
            <div class="icon">📱</div>
            <a href="tel:+79637779698" class="detail-link">+7 963 777 9698</a>
          </div>
          <div class="detail-item">
            <div class="icon">✈</div>
            <a href="https://t.me/yomanmf" target="_blank" class="detail-link">@yomanmf</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card = document.querySelector('.card');
    const detailLinks = document.querySelectorAll('.detail-link');

    // Set hand cursor on clickable links
    detailLinks.forEach(link => {
      link.style.cursor = 'pointer';
    });

    // Set arrow cursor on card when not hovering over links
    card.addEventListener('mousemove', (e) => {
      const isOverLink = Array.from(detailLinks).some(link => {
        return link.contains(e.target);
      });
      
      if (!isOverLink) {
        card.style.cursor = 'auto';
      }
    });

    card.addEventListener('mouseleave', () => {
      card.style.cursor = 'auto';
    });
  </script>
</body>
</html>
